                                                  type: object
                                                type: array
                                              jq:
                                                description: |-
                                                  JQ is a gojq program (used when type is 'jq'), supplied inline or as a referenced .jq module.
                                                  The program is one-directional: for a round-tripping field, write the inverse program in the
                                                  opposite-direction entry.
                                                properties:
                                                  entrypoint:
                                                    description: |-
                                                      Entrypoint is the jq function defined in the referenced module to invoke, e.g. "normalize".
                                                      If empty, the whole module body is executed as the program. Only meaningful together with ref.
                                                    type: string
                                                  inline:
                                                    description: Inline is a gojq
                                                      source literal. Best for short,
                                                      single-use expressions.
                                                    type: string
                                                  ref:
                                                    description: |-
                                                      Ref references a self-contained .jq module asset, using the SAME URI scheme as spec.oasPath:
                                                        configmap://<namespace>/<name>/<key>   |   http(s)://<url>
                                                    pattern: ^(configmap:\/\/([a-z0-9-]+)\/([a-z0-9-]+)\/([a-zA-Z0-9.-_]+)|https?:\/\/\S+)$
                                                    type: string
                                                type: object
                                                x-kubernetes-validations:
                                                - message: exactly one of inline or
                                                    ref must be set
                                                  rule: has(self.inline) != has(self.ref)
                                                - message: entrypoint is only valid
                                                    together with ref
                                                  rule: '!has(self.entrypoint) ||
                                                    has(self.ref)'
                                              type:
                                                description: Type selects the transform
                                                  tier.
                                                enum:
                                                - alias
                                                - jq
                                                type: string
                                            required:
                                            - type
                                            type: object
                                            x-kubernetes-validations:
                                            - message: aliases must be set when type
                                                is 'alias'
                                              rule: 'self.type == ''alias'' ? has(self.aliases)
                                                : true'
                                            - message: jq must be set when type is
                                                'jq'
                                              rule: 'self.type == ''jq'' ? has(self.jq)
                                                : true'
                                        type: object
                                        x-kubernetes-validations:
                                        - message: exactly one of inPath, inQuery,
                                            inBody or inResponse must be set
                                          rule: (has(self.inPath)?1:0)+(has(self.inQuery)?1:0)+(has(self.inBody)?1:0)+(has(self.inResponse)?1:0)
                                            == 1
                                      type: array
                                    headers:
                                      items:
                                        description: HeaderItem is a single static
                                          HTTP header injected on every request for
                                          a verb.
                                        properties:
                                          name:
                                            description: Name is the HTTP header name,
                                              e.g. 'Accept' or 'Content-Type'.
                                            type: string
                                          value:
                                            description: Value is the HTTP header
                                              value, sent verbatim.
                                            type: string
                                        required:
                                        - name
                                        - value
                                        type: object
                                      type: array
                                    method:
                                      enum:
                                      - GET
                                      - POST
                                      - PUT
                                      - DELETE
                                      - PATCH
                                      type: string
                                    notFoundCodes:
                                      items:
                                        type: integer
                                      type: array
                                    path:
                                      type: string
                                    queries:
                                      items:
                                        description: QueryParam is a single static
                                          query parameter injected on every request
                                          for a verb.
                                        properties:
                                          name:
                                            description: Name is the query parameter
                                              name, e.g. 'api-version'.
                                            type: string
                                          value:
                                            description: Value is the query parameter
                                              value, sent verbatim.
                                            type: string
                                        required:
                                        - name
                                        - value
                                        type: object
                                      type: array
                                    successCodes:
                                      description: TolerateCodes / NotFoundCodes let
                                        an already-gone sub-resource be treated as
                                        successfully deleted.
                                      items:
                                        type: integer
                                      type: array
                                    tolerateCodes:
                                      items:
                                        type: integer
                                      type: array
                                  required:
                                  - method
                                  - path
                                  type: object
                                fieldMapping:
                                  description: |-
                                    FieldMapping is the unified request/response mapping for THIS step. Request entries
                                    (inPath/inQuery/inBody) whose inCustomResource points at status.orchestration.steps.<prior>.<field>
                                    are the cross-step data-flow mechanism (a later step consumes an earlier step's captured output);
                                    response entries (inResponse) normalize this step's body before capture.
                                  items:
                                    description: |-
                                      FieldMappingItem defines a single unified mapping entry: it relocates a value between the Custom
                                      Resource and the external API (request OR response direction) and optionally transforms the value as
                                      it crosses that boundary. It generalizes RequestFieldMappingItem (which is retained, deprecated, for
                                      backward compatibility): the request anchors inPath/inQuery/inBody keep their existing meaning, and a
                                      new inResponse anchor selects a field of the API response body to be normalized into the CR-facing
                                      shape before status population and drift comparison.

