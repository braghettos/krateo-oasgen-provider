---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.5
  name: restdefinitions.ogen.krateo.io
spec:
  group: ogen.krateo.io
  names:
    categories:
    - krateo
    - restdefinition
    - core
    kind: RestDefinition
    listKind: RestDefinitionList
    plural: restdefinitions
    singular: restdefinition
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: READY
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: AGE
      type: date
    - jsonPath: .status.resource.apiVersion
      name: API VERSION
      priority: 10
      type: string
    - jsonPath: .status.resource.kind
      name: KIND
      priority: 10
      type: string
    - jsonPath: .status.oasPath
      name: OAS PATH
      priority: 10
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RestDefinition is a RestDefinition type with a spec and a status.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RestDefinitionSpec is the specification of a RestDefinition.
            properties:
              oasPath:
                description: |-
                  Path to the OpenAPI specification. This value can change over time, for example if the OAS file is updated but be sure to not change the requestbody of the `create` verb.
                  - configmap://<namespace>/<name>/<key>
                  - http(s)://<url>
                pattern: ^(configmap:\/\/([a-z0-9-]+)\/([a-z0-9-]+)\/([a-zA-Z0-9.-_]+)|https?:\/\/\S+)$
                type: string
              resource:
                description: The resource to manage
                properties:
                  additionalStatusFields:
                    description: 'AdditionalStatusFields: the list of fields to use
                      as additional status fields - used to populate the status of
                      the resource'
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: AdditionalStatusFields are immutable, you cannot change
                        them once the CRD has been generated
                      rule: self == oldSelf
                  configurationFields:
                    description: 'ConfigurationFields: the list of fields to use as
                      configuration fields'
                    items:
                      properties:
                        fromOpenAPI:
                          properties:
                            in:
                              type: string
                            name:
                              type: string
                          required:
                          - in
                          - name
                          type: object
                        fromRestDefinition:
                          properties:
                            actions:
                              description: 'Actions: the list of actions this configuration
                                applies to. Use ["*"] to apply to all actions.'
                              items:
                                type: string
                              minItems: 1
                              type: array
                          required:
                          - actions
                          type: object
                      required:
                      - fromOpenAPI
                      - fromRestDefinition
                      type: object
                    type: array
                    x-kubernetes-validations:
                    - message: ConfigurationFields are immutable, you cannot change
                        them once the CRD has been generated
                      rule: self == oldSelf
                  excludedSpecFields:
                    description: 'ExcludedSpecFields: the list of fields to exclude
                      from the spec of the generated CRD (for example server-generated
                      technical IDs could be excluded)'
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: ExcludedSpecFields are immutable, you cannot change
                        them once the CRD has been generated
                      rule: self == oldSelf
                  identifiers:
                    description: 'Identifiers: the list of fields to use as identifiers
                      - used to populate the status of the resource'
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: Identifiers are immutable, you cannot change them once
                        the CRD has been generated
                      rule: self == oldSelf
                  kind:
                    description: 'Name: the name of the resource to manage'
                    type: string
                    x-kubernetes-validations:
                    - message: Kind is immutable, you cannot change that once the
                        CRD has been generated
                      rule: self == oldSelf
                  verbsDescription:
                    description: 'VerbsDescription: the list of verbs to use on this
                      resource'
                    items:
                      properties:
                        action:
                          description: Name of the action to perform when this api
                            is called [create, update, get, delete, findby]
                          enum:
                          - create
                          - update
                          - get
                          - delete
                          - findby
                          type: string
                        fieldMapping:
                          description: |-
                            FieldMapping provides unified request/response value relocation and optional per-field value
                            transforms (alias or jq). It supersedes RequestFieldMapping: request entries (inPath/inQuery/inBody)
                            behave as before, and response entries (inResponse) normalize the observed body into the CR-domain
                            shape at the reconcile chokepoint, before status population and drift comparison. Being reconcile
                            behavior rather than CRD shape, it is intentionally mutable.
                          items:
                            description: |-
                              FieldMappingItem defines a single unified mapping entry: it relocates a value between the Custom
                              Resource and the external API (request OR response direction) and optionally transforms the value as
                              it crosses that boundary. It generalizes RequestFieldMappingItem (which is retained, deprecated, for
                              backward compatibility): the request anchors inPath/inQuery/inBody keep their existing meaning, and a
                              new inResponse anchor selects a field of the API response body to be normalized into the CR-facing
                              shape before status population and drift comparison.

                              Exactly one API-side anchor must be set. The anchor kind implies the direction:
                              inPath/inQuery/inBody => request, inResponse => response.
                            properties:
                              inBody:
                                description: |-
                                  InBody selects a REQUEST body field (request direction).
                                  Only one of 'inPath', 'inQuery', 'inBody' or 'inResponse' can be set.
                                type: string
                              inCustomResource:
                                description: |-
                                  InCustomResource is the JSONPath to the field within the Custom Resource, e.g. 'spec.permission' or
                                  'status.metadata.id'. For request entries it is the SOURCE of the value; for response entries it is
                                  the CR-domain DESTINATION whose leaf name and parent path determine where the value lands.
                                type: string
                              inPath:
                                description: |-
                                  InPath selects a REQUEST path parameter (request direction).
                                  Only one of 'inPath', 'inQuery', 'inBody' or 'inResponse' can be set.
                                type: string
                              inQuery:
                                description: |-
                                  InQuery selects a REQUEST query parameter (request direction).
                                  Only one of 'inPath', 'inQuery', 'inBody' or 'inResponse' can be set.
                                type: string
                              inResponse:
                                description: |-
                                  InResponse selects a RESPONSE body field by JSONPath (response direction).
                                  The value found here is transformed (if valueMapping is set) and relocated to the CR-domain
                                  destination given by inCustomResource, so that status population and drift comparison operate on the
                                  CR-domain shape.
                                  Only one of 'inPath', 'inQuery', 'inBody' or 'inResponse' can be set.
                                type: string
                              valueMapping:
                                description: ValueMapping optionally transforms the
                                  value as it crosses the CR<->API boundary.
                                properties:
                                  aliases:
                                    description: |-
                                      Aliases is an explicit set of bidirectional CR<->API value pairs (used when type is 'alias').
                                      On the request the CR value is rewritten to its apiValue; on the response the apiValue is rewritten
                                      back to the CR value; any value without a matching pair passes through unchanged.
                                    items:
                                      description: 'ValueAlias is a single bidirectional
                                        CR<->API value pair, e.g. {customResourceValue:
                                        read, apiValue: pull}.'
                                      properties:
                                        apiValue:
                                          description: APIValue is the corresponding
                                            value as expressed by the external API
                                            (API domain).
                                          type: string
                                        customResourceValue:
                                          description: CustomResourceValue is the
                                            value as expressed in the Custom Resource
                                            (CR domain).
                                          type: string
                                      required:
                                      - apiValue
                                      - customResourceValue
                                      type: object
                                    type: array
                                  jq:
                                    description: |-
                                      JQ is a gojq program (used when type is 'jq'), supplied inline or as a referenced .jq module.
                                      The program is one-directional: for a round-tripping field, write the inverse program in the
                                      opposite-direction entry.
                                    properties:
                                      entrypoint:
                                        description: |-
                                          Entrypoint is the jq function defined in the referenced module to invoke, e.g. "normalize".
                                          If empty, the whole module body is executed as the program. Only meaningful together with ref.
                                        type: string
                                      inline:
                                        description: Inline is a gojq source literal.
                                          Best for short, single-use expressions.
                                        type: string
                                      ref:
                                        description: |-
                                          Ref references a self-contained .jq module asset, using the SAME URI scheme as spec.oasPath:
                                            configmap://<namespace>/<name>/<key>   |   http(s)://<url>
                                        pattern: ^(configmap:\/\/([a-z0-9-]+)\/([a-z0-9-]+)\/([a-zA-Z0-9.-_]+)|https?:\/\/\S+)$
                                        type: string
                                    type: object
                                    x-kubernetes-validations:
                                    - message: exactly one of inline or ref must be
                                        set
                                      rule: has(self.inline) != has(self.ref)
                                    - message: entrypoint is only valid together with
                                        ref
                                      rule: '!has(self.entrypoint) || has(self.ref)'
                                  type:
                                    description: Type selects the transform tier.
                                    enum:
                                    - alias
                                    - jq
                                    type: string
                                required:
                                - type
                                type: object
                                x-kubernetes-validations:
                                - message: aliases must be set when type is 'alias'
                                  rule: 'self.type == ''alias'' ? has(self.aliases)
                                    : true'
                                - message: jq must be set when type is 'jq'
                                  rule: 'self.type == ''jq'' ? has(self.jq) : true'
                            type: object
                            x-kubernetes-validations:
                            - message: exactly one of inPath, inQuery, inBody or inResponse
                                must be set
                              rule: (has(self.inPath)?1:0)+(has(self.inQuery)?1:0)+(has(self.inBody)?1:0)+(has(self.inResponse)?1:0)
                                == 1
                          type: array
                        identifiersMatchPolicy:
                          description: |-
                            IdentifiersMatchPolicy defines how to match identifiers for the 'findby' action. To be set only for 'findby' actions.
                            If not set, defaults to 'OR'.
                            Possible values are 'AND' or 'OR'.
                            - 'AND': all identifiers must match.
                            - 'OR': at least one identifier must match (the default behavior).
                          enum:
                          - AND
                          - OR
                          type: string
                        method:
                          description: 'Method: the http method to use [GET, POST,
                            PUT, DELETE, PATCH]'
                          enum:
                          - GET
                          - POST
                          - PUT
                          - DELETE
                          - PATCH
                          type: string
                        pagination:
                          description: |-
                            Pagination defines the pagination strategy for 'findby' actions. To be set only for 'findby' actions.
                            If not set, no pagination will be used.
                          properties:
                            continuationToken:
                              description: Configuration for 'continuationToken' pagination.
                                Required if type is 'continuationToken'.
                              properties:
                                request:
                                  description: 'Request: defines how to include the
                                    pagination token in the API request.'
                                  properties:
                                    tokenIn:
                                      description: 'Where the token is located: "query",
                                        "header" or "body". Currently, only "query"
                                        is supported.'
                                      enum:
                                      - query
                                      type: string
                                    tokenPath:
                                      description: |-
                                        The path or name of the query parameter, header, or body field.
                                        For query parameters and headers, this is simply the name.
                                        For body fields, this should be a JSON path.
                                      type: string
                                  required:
                                  - tokenIn
                                  - tokenPath
                                  type: object
                                response:
                                  description: 'Response: defines how to extract the
                                    pagination token from the API response.'
                                  properties:
                                    tokenIn:
                                      description: 'Where the token is located: "header"
                                        or "body". Currently, only "header" is supported.'
                                      enum:
                                      - header
                                      type: string
                                    tokenPath:
                                      description: |-
                                        The path or name of the header or body field.
                                        For headers, this is simply the name.
                                        For body fields, this should be a JSON path.
                                      type: string
                                  required:
                                  - tokenIn
                                  - tokenPath
                                  type: object
                              required:
                              - request
                              - response
                              type: object
                            type:
                              description: Type specifies the pagination strategy.
                                Currently, only 'continuationToken' is supported.
                              enum:
                              - continuationToken
                              type: string
                          required:
                          - type
                          type: object
                          x-kubernetes-validations:
                          - message: continuationToken configuration must be provided
                              when type is 'continuationToken'
                            rule: 'self.type == ''continuationToken'' ? has(self.continuationToken)
                              : true'
                        path:
                          description: 'Path: the path to the api - has to be the
                            same path as the one in the OAS file you are referencing'
                          type: string
                        requestFieldMapping:
                          description: |-
                            RequestFieldMapping provides explicit mapping from API parameters (path, query, or body)
                            to fields in the Custom Resource.

                            Deprecated: use FieldMapping instead. RequestFieldMapping is request-direction only and carries no
                            value transform; it is retained for backward compatibility and each entry is treated as an
                            equivalent request-direction FieldMappingItem at load time. It will be removed after a migration window.
                          items:
                            description: |-
                              RequestFieldMappingItem defines a single mapping from a path parameter, query parameter or body field
                              to a field in the Custom Resource.
                            properties:
                              inBody:
                                description: |-
                                  InBody defines the name of the body parameter to be mapped.
                                  Only one of 'inPath', 'inQuery' or 'inBody' can be set.
                                type: string
                              inCustomResource:
                                description: |-
                                  InCustomResource defines the JSONPath to the field within the Custom Resource that holds the value.
                                  For example: 'spec.name' or 'status.metadata.id'.
                                  Note: potentially we could add validation to ensure this is a valid path (e.g., starts with 'spec.' or 'status.').
                                  Currently, no validation is enforced on the content of this field.
                                type: string
                              inPath:
                                description: |-
                                  InPath defines the name of the path parameter to be mapped.
                                  Only one of 'inPath', 'inQuery' or 'inBody' can be set.
                                type: string
                              inQuery:
                                description: |-
                                  InQuery defines the name of the query parameter to be mapped.
                                  Only one of 'inPath', 'inQuery' or 'inBody' can be set.
                                type: string
                            required:
                            - inCustomResource
                            type: object
                            x-kubernetes-validations:
                            - message: Either inPath, inQuery or inBody must be set,
                                but not more than one
                              rule: '(has(self.inPath) ? 1 : 0) + (has(self.inQuery)
                                ? 1 : 0) + (has(self.inBody) ? 1 : 0) == 1'
                          type: array
                        requestTransform:
                          description: |-
                            RequestTransform is a whole-document gojq program applied to the assembled request body immediately
                            before it is sent. It is the document-scoped sibling of a per-field jq valueMapping.
                          properties:
                            entrypoint:
                              description: |-
                                Entrypoint is the jq function defined in the referenced module to invoke, e.g. "normalize".
                                If empty, the whole module body is executed as the program. Only meaningful together with ref.
                              type: string
                            inline:
                              description: Inline is a gojq source literal. Best for
                                short, single-use expressions.
                              type: string
                            ref:
                              description: |-
                                Ref references a self-contained .jq module asset, using the SAME URI scheme as spec.oasPath:
                                  configmap://<namespace>/<name>/<key>   |   http(s)://<url>
                              pattern: ^(configmap:\/\/([a-z0-9-]+)\/([a-z0-9-]+)\/([a-zA-Z0-9.-_]+)|https?:\/\/\S+)$
                              type: string
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of inline or ref must be set
                            rule: has(self.inline) != has(self.ref)
                          - message: entrypoint is only valid together with ref
                            rule: '!has(self.entrypoint) || has(self.ref)'
                        responseTransform:
                          description: |-
                            ResponseTransform is a whole-document gojq program applied to the raw response body once, at the
                            reconcile chokepoint, before per-field fieldMapping, status population and drift comparison. Input
                            '.' is the entire response body and the single output replaces it. It is the declarative form of a
                            plugin's whole-body response normalizer.
                          properties:
                            entrypoint:
                              description: |-
                                Entrypoint is the jq function defined in the referenced module to invoke, e.g. "normalize".
                                If empty, the whole module body is executed as the program. Only meaningful together with ref.
                              type: string
                            inline:
                              description: Inline is a gojq source literal. Best for
                                short, single-use expressions.
                              type: string
                            ref:
                              description: |-
                                Ref references a self-contained .jq module asset, using the SAME URI scheme as spec.oasPath:
                                  configmap://<namespace>/<name>/<key>   |   http(s)://<url>
                              pattern: ^(configmap:\/\/([a-z0-9-]+)\/([a-z0-9-]+)\/([a-zA-Z0-9.-_]+)|https?:\/\/\S+)$
                              type: string
                          type: object
                          x-kubernetes-validations:
                          - message: exactly one of inline or ref must be set
                            rule: has(self.inline) != has(self.ref)
                          - message: entrypoint is only valid together with ref
                            rule: '!has(self.entrypoint) || has(self.ref)'
                        tolerateCodes:
                          description: |-
                            TolerateCodes lists HTTP status codes that, for this verb, are treated as a successful EMPTY response
                            instead of an error. Use it when a code that would otherwise fail the call actually means "the
                            (sub-)resource is simply empty / not present yet" rather than a real failure — e.g. an API returning
                            404 for an optional collection with no entries. Use with care: tolerating 404 on a verb whose code
                            genuinely signals a deleted resource would mask that deletion.
                          items:
                            type: integer
                          type: array
                      required:
                      - action
                      - method
                      - path
                      type: object
                      x-kubernetes-validations:
                      - message: identifiersMatchPolicy can only be set for 'findby'
                          actions
                        rule: self.action == 'findby' || !has(self.identifiersMatchPolicy)
                      - message: pagination can only be set for 'findby' actions
                        rule: self.action == 'findby' || !has(self.pagination)
                    type: array
                required:
                - kind
                - verbsDescription
                type: object
              resourceGroup:
                description: 'Group: the group of the resource to manage'
                type: string
                x-kubernetes-validations:
                - message: ResourceGroup is immutable, you cannot change that once
                    the CRD has been generated
                  rule: self == oldSelf
            required:
            - oasPath
            - resource
            - resourceGroup
            type: object
          status:
            description: RestDefinitionStatus is the status of a RestDefinition.
            properties:
              conditions:
                description: Conditions of the resource.
                items:
                  description: A Condition that may apply to a resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        LastTransitionTime is the last time this condition transitioned from one
                        status to another.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        A Message containing details about this condition's last transition from
                        one status to another, if any.
                      type: string
                    reason:
                      description: A Reason for this condition's last transition from
                        one status to another.
                      type: string
                    status:
                      description: Status of this condition; is it currently True,
                        False, or Unknown?
                      type: string
                    type:
                      description: |-
                        Type of this condition. At most one of each condition type may apply to
                        a resource at any point in time.
                      type: string
                  required:
                  - lastTransitionTime
                  - reason
                  - status
                  - type
                  type: object
                type: array
              configuration:
                description: 'Configuration: the configuration of the resource'
                properties:
                  apiVersion:
                    description: 'APIVersion: the api version of the resource'
                    type: string
                  kind:
                    description: 'Kind: the kind of the resource'
                    type: string
                type: object
              digest:
                description: 'Digest: the digest of the managed resources'
                type: string
              hasSecuritySchemes:
                description: |-
                  HasSecuritySchemes: whether the OAS document defines security schemes.
                  Cached here so Observe does not need to re-fetch the OAS document on every reconcile.
                type: boolean
              oasPath:
                description: 'OASPath: the path to the OAS Specification file.'
                type: string
              resource:
                description: 'Resource: the resource to manage'
                properties:
                  apiVersion:
                    description: 'APIVersion: the api version of the resource'
                    type: string
                  kind:
                    description: 'Kind: the kind of the resource'
                    type: string
                type: object
            required:
            - oasPath
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
