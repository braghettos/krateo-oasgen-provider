                          properties:
                            in:
                              type: string
                            name:
                              type: string
                          required:
                          - in
                          - name
                          type: object
                        fromRestDefinition:
                          properties:
                            actions:
                              description: 'Actions: the list of actions this configuration
                                applies to. Use ["*"] to apply to all actions.'
                              items:
                                type: string
                              minItems: 1
                              type: array
                          required:
                          - actions
                          type: object
                      required:
                      - fromOpenAPI
                      - fromRestDefinition
                      type: object
                    type: array
                    x-kubernetes-validations:
                    - message: ConfigurationFields are immutable, you cannot change
                        them once the CRD has been generated
                      rule: self == oldSelf
