                                              Only one of 'inPath', 'inQuery', 'inBody' or 'inResponse' can be set.
                                            type: string
                                          valueMapping:
                                            description: ValueMapping optionally transforms
                                              the value as it crosses the CR<->API
                                              boundary.
                                            properties:
                                              aliases:
                                                description: |-
                                                  Aliases is an explicit set of bidirectional CR<->API value pairs (used when type is 'alias').
                                                  On the request the CR value is rewritten to its apiValue; on the response the apiValue is rewritten
                                                  back to the CR value; any value without a matching pair passes through unchanged.
                                                items:
                                                  description: 'ValueAlias is a single
                                                    bidirectional CR<->API value pair,
                                                    e.g. {customResourceValue: read,
                                                    apiValue: pull}.'
                                                  properties:
                                                    apiValue:
                                                      description: APIValue is the
                                                        corresponding value as expressed
                                                        by the external API (API domain).
                                                      type: string
                                                    customResourceValue:
                                                      description: CustomResourceValue
                                                        is the value as expressed
                                                        in the Custom Resource (CR
                                                        domain).
                                                      type: string
                                                  required:
