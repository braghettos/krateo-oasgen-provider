                                          description: 'Path: the JSONPath (for in=body)
                                            or header name (for in=header) that carries
                                            the handle.'
                                          type: string
                                      required:
                                      - in
                                      - path
                                      type: object
                                    poll:
                                      description: 'Poll: the polling endpoint and
                                        its terminal semantics.'
                                      properties:
                                        failureValues:
                                          description: 'FailureValues: status values
                                            that mark terminal failure.'
                                          items:
                                            type: string
                                          type: array
                                        intervalSeconds:
                                          description: 'IntervalSeconds: delay between
                                            polls. Defaults to 1.'
                                          type: integer
                                        maxAttempts:
                                          description: 'MaxAttempts: maximum number
