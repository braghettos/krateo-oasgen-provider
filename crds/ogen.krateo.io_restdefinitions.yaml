                    description: 'Identifiers: the list of fields to use as identifiers
                      - used to populate the status of the resource'
                    items:
                      type: string
                    type: array
                    x-kubernetes-validations:
                    - message: Identifiers are immutable, you cannot change them once
                        the CRD has been generated
                      rule: self == oldSelf
                  kind:
                    description: 'Name: the name of the resource to manage'
                    type: string
                    x-kubernetes-validations:
                    - message: Kind is immutable, you cannot change that once the
                        CRD has been generated
                      rule: self == oldSelf
                  orchestration:
                    description: |-
                      Orchestration, when set, realizes the resource's create/delete lifecycle as an ordered SEQUENCE of
                      idempotent REST calls (steps) instead of the single create/delete verbs — dissolving hand-written
                      proxies that only exist to chain multiple calls (e.g. create repo -> create webhook -> set branch).
                      The get/findby verbs in verbsDescription still drive Observe existence and drift on the primary
                      resource. Nil => single-call behavior, unchanged. Being reconcile behavior rather than CRD shape, it
                      is intentionally mutable.
                    properties:
                      create:
                        description: |-
                          Create is the ordered sequence of calls that provisions the resource. When set it replaces the single
                          create verb.
                        properties:
                          steps:
                            description: Steps run in declaration order; each step's
                              captured outputs become available to later steps.
                            items:
                              description: |-
                                Step is one call in a plan. It reuses the per-verb feature set: at runtime it is lifted into a synthetic
                                verb so the same client, path/query/header resolution, OAS validation, response normalization and async
                                engine run verbatim.
                              properties:
                                async:
                                  description: |-
                                    Async declares long-running-operation handling for this step. In the first increment only
                                    mode=blocking is honored (the step polls to completion inline); requeue is reserved for a later one.
                                  properties:
                                    mode:
                                      description: |-
                                        Mode selects how the long-running operation is driven:
                                          - "blocking" (default): the trigger reconcile polls the operation to completion inline (Model A).
                                            Simplest, but occupies a reconcile worker for the duration of the operation.
                                          - "requeue": the trigger reconcile fires the operation, records its handle, and returns; each
                                            subsequent reconcile polls the operation once and requeues until it reaches a terminal status
                                            (Model B). Non-blocking — it never pins a worker — and adds terminal-failure detection to the
                                            otherwise blind "wait for the resource to appear" pending flow. Because the operation is triggered
                                            before its handle is recorded, the trigger must be idempotent (as for blocking mode). requeue
                                            applies to create/update; delete always polls inline, since the finalizer must be held until the
                                            delete operation completes.
