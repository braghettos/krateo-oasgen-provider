                                      - blocking
                                      - requeue
                                      type: string
                                    operationRef:
                                      description: 'OperationRef: how to extract the
                                        operation handle from the trigger response.'
                                      properties:
                                        in:
                                          description: 'In: where the handle is located:
                                            "body" (a JSONPath into the trigger response
                                            body) or "header".'
                                          enum:
                                          - body
                                          - header
                                          type: string
                                        jq:
                                          description: 'JQ: optional gojq program
                                            to derive the handle from the raw value
                                            at Path (e.g. an id from a URL).'
                                          properties:
                                            entrypoint:
                                              description: |-
                                                Entrypoint is the jq function defined in the referenced module to invoke, e.g. "normalize".
                                                If empty, the whole module body is executed as the program. Only meaningful together with ref.
                                              type: string
                                            inline:
                                              description: Inline is a gojq source
                                                literal. Best for short, single-use
                                                expressions.
                                              type: string
                                            ref:
                                              description: |-
                                                Ref references a self-contained .jq module asset, using the SAME URI scheme as spec.oasPath:
                                                  configmap://<namespace>/<name>/<key>   |   http(s)://<url>
                                              pattern: ^(configmap:\/\/([a-z0-9-]+)\/([a-z0-9-]+)\/([a-zA-Z0-9.-_]+)|https?:\/\/\S+)$
                                              type: string
                                          type: object
                                          x-kubernetes-validations:
